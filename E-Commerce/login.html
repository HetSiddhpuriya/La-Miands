<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | ShopVerse</title>
    <meta name="description" content="Sign in to your ShopVerse account to track orders and manage your account.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛍️</text></svg>">
    <style>
        .auth-container {
            min-height: 100vh;
            display: grid;
            grid-template-columns: 1fr;
            background: var(--gray-50);
        }

        @media (min-width: 1024px) {
            .auth-container {
                grid-template-columns: 1fr 1fr;
            }
        }

        .auth-visual {
            display: none;
            position: relative;
            background: linear-gradient(135deg, var(--primary-800) 0%, var(--primary-900) 100%);
            overflow: hidden;
            padding: 4rem;
            align-items: center;
            justify-content: center;
        }

        @media (min-width: 1024px) {
            .auth-visual {
                display: flex;
            }
        }

        .auth-visual-orb {
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            filter: blur(80px);
            background: var(--primary-500);
            opacity: 0.3;
            animation: float 10s infinite alternate;
        }

        @keyframes float {
            from {
                transform: translate(-10%, -10%) scale(1);
            }

            to {
                transform: translate(10%, 10%) scale(1.1);
            }
        }

        .auth-form-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .auth-card {
            width: 100%;
            max-width: 440px;
            background: white;
            padding: 3rem;
            border-radius: var(--radius-2xl);
            box-shadow: var(--shadow-xl);
            border: 1px solid var(--gray-100);
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            padding: 0.75rem;
            border: 1.5px solid var(--gray-200);
            border-radius: var(--radius-md);
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--gray-700);
            transition: var(--transition-fast);
        }

        .social-btn:hover {
            border-color: var(--primary-300);
            background: var(--primary-50);
        }

        .auth-divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.5rem 0;
            color: var(--gray-400);
            font-size: 0.85rem;
        }

        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--gray-200);
        }

        .form-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--gray-700);
            margin-bottom: 0.5rem;
        }

        .auth-input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1.5px solid var(--gray-200);
            border-radius: var(--radius-md);
            transition: var(--transition-fast);
        }

        .auth-input:focus {
            outline: none;
            border-color: var(--primary-500);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }
    </style>
</head>

<body>

    <div class="auth-container">
        <!-- Visual Side -->
        <div class="auth-visual">
            <div class="auth-visual-orb"></div>
            <div style="position:relative;z-index:2;max-width:400px;text-align:center;">
                <div class="logo-icon"
                    style="width:64px;height:64px;font-size:1.75rem;margin:0 auto 1.5rem;border-radius:var(--radius-xl);">
                    SV</div>
                <h1
                    style="font-size:2.5rem;font-weight:800;color:white;margin-bottom:1rem;font-family:var(--font-display);">
                    Welcome Back</h1>
                <p style="color:rgba(255,255,255,0.6);font-size:1.1rem;line-height:1.6;">Sign in to your account and
                    continue your premium shopping journey at ShopVerse.</p>
            </div>
        </div>

        <!-- Form Side -->
        <div class="auth-form-wrap">
            <div class="auth-card">
                <div style="text-align:center;margin-bottom:2rem;">
                    <a href="index.html" class="logo" style="justify-content:center;margin-bottom:1rem;">
                        <div class="logo-icon">SV</div>
                        <span>ShopVerse</span>
                    </a>
                    <h2 style="font-size:1.5rem;font-weight:700;color:var(--gray-900);">Sign In</h2>
                    <p style="color:var(--gray-500);font-size:0.95rem;">Enter your credentials to continue</p>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <button class="social-btn" onclick="Cart.showNotification('Google login coming soon!')">
                        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
                            style="width:18px;">
                        Google
                    </button>
                    <button class="social-btn" onclick="Cart.showNotification('Facebook login coming soon!')">
                        <svg width="18" height="18" fill="#1877F2" viewBox="0 0 24 24">
                            <path
                                d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" />
                        </svg>
                        Facebook
                    </button>
                </div>

                <div class="auth-divider">or sign in with email</div>

                <form id="loginForm" class="space-y-4">
                    <div>
                        <label class="form-label">Email Address</label>
                        <input type="email" id="loginEmail" class="auth-input" placeholder="name@example.com" required>
                    </div>
                    <div>
                        <div style="display:flex;justify-content:space-between;align-items:center;">
                            <label class="form-label">Password</label>
                            <a href="#" style="font-size:0.8rem;color:var(--primary-600);font-weight:600;">Forgot?</a>
                        </div>
                        <input type="password" id="loginPassword" class="auth-input" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="btn-primary"
                        style="width:100%;padding:0.875rem;justify-content:center;">
                        Sign In
                    </button>
                </form>

                <p style="text-align:center;margin-top:2rem;color:var(--gray-500);font-size:0.9rem;">
                    Don't have an account?
                    <a href="register.html" style="color:var(--primary-600);font-weight:700;">Create Account</a>
                </p>
                <div style="text-align:center;margin-top:1.5rem;">
                    <a href="index.html"
                        style="font-size:0.8rem;color:var(--gray-400);display:inline-flex;align-items:center;gap:0.375rem;">
                        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                        </svg>
                        Back to Home
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="js/products.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPassword').value;
            const res = Auth.login(email, pass);
            if (res.success) {
                Cart.showNotification(res.message);
                setTimeout(() => window.location.href = 'index.html', 1000);
            } else {
                alert(res.message);
            }
        });
    </script>
</body>

</html>
