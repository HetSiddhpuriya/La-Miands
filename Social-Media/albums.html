<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SocialHub – Albums</title>
    <meta name="description" content="Browse albums and photo galleries on SocialHub." />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'primary-red': '#780000',
                        'accent-red': '#C1121F',
                        'dark-red': '#AE1F23',
                        'cosmos-blue': '#003049',
                        'marble-blue': '#669BBC',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="css/style.css" />
</head>

<body>
    <div id="navbarContainer"></div>

    <main class="max-w-6xl mx-auto px-4 py-10">
        <h1 class="section-title text-3xl font-bold mb-8" id="pageTitle">Albums</h1>

        <!-- Album list OR photo grid -->
        <div id="albumsContainer">
            <div class="flex justify-center py-12">
                <div class="spinner"></div>
            </div>
        </div>
    </main>

    <!-- Lightbox -->
    <div id="lightbox" class="lightbox" onclick="closeLightbox(event)">
        <button class="lightbox-close" aria-label="Close">&times;</button>
        <img id="lightboxImg" src="" alt="Full size" />
        <p id="lightboxTitle" class="lightbox-title"></p>
    </div>

    <div id="footerContainer"></div>

    <script src="js/api.js"></script>
    <script src="js/albums.js"></script>
</body>

</html>
