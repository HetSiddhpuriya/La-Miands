<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SocialHub – Users</title>
    <meta name="description" content="Browse and search all users on SocialHub." />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'primary-red': '#780000',
                        'accent-red': '#C1121F',
                        'dark-red': '#AE1F23',
                        'cosmos-blue': '#003049',
                        'marble-blue': '#669BBC',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="css/style.css" />
</head>

<body>
    <div id="navbarContainer"></div>

    <main class="max-w-6xl mx-auto px-4 py-10">
        <!-- Page Header -->
        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-8">
            <h1 class="section-title text-3xl font-bold">Our Community</h1>
            <div class="relative">
                <i
                    class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                <input id="userSearch" type="text" placeholder="Filter users by name…"
                    class="search-input text-sm w-full md:w-72" />
            </div>
        </div>

        <!-- Users Grid -->
        <div id="usersGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- User cards loaded here -->
        </div>

        <p id="noResults" class="hidden text-center text-slate-500 mt-10 text-lg">
            <i class="fa-regular fa-face-frown mr-2"></i> No users match your search.
        </p>
    </main>

    <div id="footerContainer"></div>

    <script src="js/api.js"></script>
    <script src="js/users.js"></script>
</body>

</html>
